    <!-- ===== GATE DE ACESSO - ESTILO CINERADAR ===== -->
    <div id="cine-gate-overlay" style="
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(10,10,10,0.88);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        z-index: 99999;
        align-items: center;
        justify-content: center;
        padding: 16px;
        font-family: 'Inter', sans-serif;
    ">
        <div style="
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 28px 22px 22px;
            max-width: 300px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(229,9,20,0.1);
            animation: gatePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        ">
            <div style="
                width: 56px; height: 56px; background: rgba(229,9,20,0.12);
                border-radius: 16px; display: flex; align-items: center; justify-content: center;
                margin: 0 auto 16px; font-size: 26px; animation: gateIconPulse 2s ease infinite;
            ">🍿</div>

            <h2 style="margin: 0 0 6px; font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.3px;">Sessão Especial</h2>
            <p style="margin: 0 0 20px; font-size: 13px; color: #888; line-height: 1.5;">
                Desbloqueie <strong style="color:#e50914">5 horas</strong> de streaming sem paradas.
            </p>

            <div id="cine-gate-timer" style="
                display: none; margin-bottom: 16px; padding: 10px 14px;
                background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.12);
                border-radius: 12px;
            ">
                <div style="font-size:11px;color:#00ff88;margin-bottom:2px"><i class="fas fa-check-circle"></i> Liberado</div>
                <div style="font-size:16px;font-weight:800;color:#00ff88;font-variant-numeric:tabular-nums" id="cine-gate-countdown">05:00:00</div>
            </div>

            <a id="cine-gate-unlock" href="https://omg10.com/4/11031110" target="_blank" style="
                width: 100%; padding: 13px 18px; background: #e50914; color: #fff;
                border: none; border-radius: 14px; font-size: 14px; font-weight: 700;
                font-family: 'Inter', sans-serif; cursor: pointer;
                display: flex; align-items: center; justify-content: center; gap: 8px;
                text-decoration: none; box-shadow: 0 4px 20px rgba(229,9,20,0.35);
                transition: transform 0.15s, box-shadow 0.15s;
            ">
                <i class="fas fa-play" style="font-size:11px"></i> Assistir Agora
            </a>

            <p style="margin: 14px 0 0; font-size: 10px; color: #444;">CineRadar 🎬 Streaming Guide</p>
        </div>
    </div>

    <style>
        @keyframes gatePop { from { opacity: 0; transform: scale(0.85) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes gateIconPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #cine-gate-overlay.active { display: flex !important; }
        body.gate-locked { overflow: hidden !important; height: 100vh !important; touch-action: none !important; }
        #cine-gate-unlock:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(229,9,20,0.3); }
    </style>

    <script>
    (function() {
        'use strict';
        var GATE_KEY = 'cineradar_gate_unlock';
        var GATE_DURATION = 5 * 60 * 60 * 1000;
        var AD_LINKS = [
            { url: 'https://omg10.com/4/11031110', label: 'Assistir Agora', color: '#e50914' },
            { url: 'https://omg10.com/4/11033789', label: 'Assistir Agora 2', color: '#6366f1' }
        ];
        function getAd() {
            var idx = parseInt(localStorage.getItem('cineradar_ad_index') || '-1');
            idx = (idx + 1) % AD_LINKS.length;
            localStorage.setItem('cineradar_ad_index', idx.toString());
            return AD_LINKS[idx];
        }
        function getUnlockTime() { var raw = localStorage.getItem(GATE_KEY); return raw ? parseInt(raw, 10) : 0; }
        function setUnlockTime() { localStorage.setItem(GATE_KEY, Date.now().toString()); }
        function isUnlocked() { var unlockedAt = getUnlockTime(); if (!unlockedAt) return false; return (Date.now() - unlockedAt) < GATE_DURATION; }
        function getRemainingTime() { var unlockedAt = getUnlockTime(); if (!unlockedAt) return 0; return Math.max(0, GATE_DURATION - (Date.now() - unlockedAt)); }
        function formatTime(ms) {
            var totalSeconds = Math.floor(ms / 1000);
            var h = Math.floor(totalSeconds / 3600);
            var m = Math.floor((totalSeconds % 3600) / 60);
            var s = totalSeconds % 60;
            return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
        }
        function showGate() { var overlay = document.getElementById('cine-gate-overlay'); if (!overlay) return; overlay.classList.add('active'); document.body.classList.add('gate-locked'); }
        function hideGate() { var overlay = document.getElementById('cine-gate-overlay'); if (!overlay) return; overlay.classList.remove('active'); document.body.classList.remove('gate-locked'); }
        function showTimerAndHide() {
            var timerBox = document.getElementById('cine-gate-timer');
            var countdown = document.getElementById('cine-gate-countdown');
            var unlockBtn = document.getElementById('cine-gate-unlock');
            if (timerBox) timerBox.style.display = 'block';
            if (unlockBtn) {
                unlockBtn.innerHTML = '<i class="fas fa-check" style="font-size:11px"></i> Liberado!';
                unlockBtn.style.background = '#00ff88';
                unlockBtn.style.boxShadow = '0 4px 20px rgba(0,255,136,0.3)';
                unlockBtn.style.pointerEvents = 'none';
            }
            setTimeout(function() { hideGate(); }, 1500);
            var interval = setInterval(function() {
                var remaining = getRemainingTime();
                if (remaining <= 0) { clearInterval(interval); localStorage.removeItem(GATE_KEY); return; }
                if (countdown) countdown.textContent = formatTime(remaining);
            }, 1000);
        }
        function initGate() {
            var unlockBtn = document.getElementById('cine-gate-unlock');
            var ad = getAd();
            if (unlockBtn) {
                unlockBtn.href = ad.url;
                unlockBtn.style.background = ad.color;
                unlockBtn.style.boxShadow = '0 4px 20px ' + ad.color + '59';
                unlockBtn.querySelector('span')?.remove();
                var span = document.createElement('span');
                span.textContent = ad.label;
                unlockBtn.appendChild(span);
                unlockBtn.addEventListener('click', function(e) {
                    if (!isUnlocked()) { setUnlockTime(); showTimerAndHide(); }
                });
            }
            if (isUnlocked()) { hideGate(); } else { localStorage.removeItem(GATE_KEY); showGate(); }
        }
        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initGate); } else { initGate(); }
    })();
    </script>
